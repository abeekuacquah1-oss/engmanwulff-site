<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0E0E0E"/>
  <!-- Gold top line accent -->
  <line x1="140" y1="198" x2="372" y2="198" stroke="#C9A96E" stroke-width="2.5"/>
  <!-- E and W stacked, centred -->
  <text x="256" y="188" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="152" font-weight="300" fill="#F5F0E8" letter-spacing="18">E</text>
  <text x="256" y="340" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="152" font-weight="300" fill="#F5F0E8" letter-spacing="18">W</text>
  <!-- Gold bottom line accent -->
  <line x1="140" y1="358" x2="372" y2="358" stroke="#C9A96E" stroke-width="2.5"/>
</svg>
